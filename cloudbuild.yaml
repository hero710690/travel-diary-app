steps:
  # Step 1: Build and push backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:latest'
      - '-f'
      - 'python-backend/Dockerfile.cloudrun'
      - 'python-backend'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api'

  # Step 3: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/api:${SHORT_SHA}'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'travel-diary-run-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'DATABASE_TYPE=firestore,GCP_PROJECT_ID=${PROJECT_ID},ENVIRONMENT=production,DEBUG=false,API_V1_STR=/api/v1,PROJECT_NAME=Travel Diary API,VERSION=1.0.0,ALGORITHM=HS256,ACCESS_TOKEN_EXPIRE_MINUTES=30,BACKEND_CORS_ORIGINS=["https://trip-diary.web.app","https://trip-diary.firebaseapp.com"],SECRET_KEY=${_JWT_SECRET_KEY},GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY}'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'

  # Step 4: Install frontend dependencies and build
  - name: 'node:18'
    entrypoint: bash
    args:
      - '-c'
      - |
        cd client
        cp .env.gcp .env.production
        npm ci
        npm run build

  # Step 5: Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting:trip-diary --project ${PROJECT_ID} --non-interactive

substitutions:
  _REGION: asia-northeast1
  _SERVICE_NAME: travel-diary-api
  _REPO_NAME: travel-diary-backend
  _JWT_SECRET_KEY: ''
  _GOOGLE_MAPS_API_KEY: 'AIzaSyCWOl79PAYQJ5lu4ASQhuPuXGP-oHS2PgA'

options:
  logging: CLOUD_LOGGING_ONLY
